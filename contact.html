{% extends 'base.html' %}
{% load static %}

{% block title %}Contact{% endblock %}

{% block content %}

<!-- PAGE BACKGROUND -->
<div class="min-h-screen bg-gradient-to-br from-indigo-100 via-white to-indigo-200">


<!-- ================= HEADER ================= -->
<section class="text-center py-12">
  <h1 class="text-4xl font-bold text-gray-900 mb-2">Contact Us</h1>
  <p class="text-gray-700">We would love to hear from you</p>
</section>



<!-- ================= CONTACT SECTION ================= -->
<section class="max-w-6xl mx-auto px-6 pb-16 grid md:grid-cols-2 gap-10 items-center">

  <!-- ================= CONTACT INFO ================= -->
  <div class="space-y-6">

    <div class="backdrop-blur-xl bg-white/30 border border-white/40
                p-6 rounded-2xl shadow-xl hover:scale-105 transition">
      <h3 class="text-lg font-semibold mb-1 text-gray-900">📍 Address</h3>
      <p class="text-gray-700">Nellore, Andhra Pradesh, India</p>
    </div>

    <div class="backdrop-blur-xl bg-white/30 border border-white/40
                p-6 rounded-2xl shadow-xl hover:scale-105 transition">
      <h3 class="text-lg font-semibold mb-1 text-gray-900">📞 Phone</h3>
      <p class="text-gray-700">+91 9876543210</p>
    </div>

    <div class="backdrop-blur-xl bg-white/30 border border-white/40
                p-6 rounded-2xl shadow-xl hover:scale-105 transition">
      <h3 class="text-lg font-semibold mb-1 text-gray-900">✉ Email</h3>
      <p class="text-gray-700">support@smarthabit.com</p>
    </div>

  </div>



  <!-- ================= CONTACT FORM ================= -->
  <div class="backdrop-blur-2xl bg-white/30 border border-white/40
              rounded-3xl shadow-2xl p-8">

    <h2 class="text-2xl font-semibold mb-6 text-center text-gray-900">
      Send Message
    </h2>

    <form class="space-y-5">

      <input type="text"
      placeholder="Full Name"
      class="w-full px-4 py-3 rounded-xl
             bg-white/70 border border-gray-300
             text-gray-900 placeholder-gray-500
             focus:outline-none focus:ring-2 focus:ring-indigo-500">

      <input type="email"
      placeholder="Email Address"
      class="w-full px-4 py-3 rounded-xl
             bg-white/70 border border-gray-300
             text-gray-900 placeholder-gray-500
             focus:outline-none focus:ring-2 focus:ring-indigo-500">

      <textarea rows="4"
      placeholder="Your Message"
      class="w-full px-4 py-3 rounded-xl
             bg-white/70 border border-gray-300
             text-gray-900 placeholder-gray-500
             focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>

      <button class="w-full bg-indigo-600 text-white py-3 rounded-xl
                       font-semibold hover:bg-indigo-700 transition shadow-lg">
        Send Message
      </button>

    </form>

  </div>

</section>



<!-- ================= MAP ================= -->
<section class="max-w-6xl mx-auto px-6 pb-16">
  <div class="backdrop-blur-2xl bg-white/30 border border-white/40
              rounded-3xl overflow-hidden shadow-2xl">
    <iframe
      class="w-full h-96"
      src="https://maps.google.com/maps?q=nellore%20andhra%20pradesh&t=&z=13&ie=UTF8&iwloc=&output=embed">
    </iframe>
  </div>
</section>

</div>

{% endblock %}
