{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Smart Habit Tracker{% endblock %}</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- NAVBAR -->
<header class="bg-[#0F1035]/90 backdrop-blur-md fixed w-full z-50 shadow-lg">
  <div class="max-w-7xl mx-auto flex justify-between items-center px-8 py-6">
    
    <!-- Logo -->
    <h1 class="text-2xl font-bold tracking-wide">Smart Habit</h1>

    <!-- Navigation -->
    <nav class="space-x-10 text-lg font-semibold text-gray-300">
      <a href="/" class="hover:text-white transition">Home</a>
      <a href="/about/" class="hover:text-white transition">About Us</a>
      <a href="/overview/" class="hover:text-white transition">Overview</a>
      <a href="/contact/" class="hover:text-white transition">Contact</a>
      <a href="/signin/" class="hover:text-white transition">Sign In</a>

      <a href="/get-started/"
         class="bg-[#0F1035]/60 backdrop-blur-md text-white px-6 py-3 rounded-xl font-bold
                border border-white/20 hover:bg-[#0F1035]/80 transition duration-300 shadow-md">
         Get Started
      </a>
    </nav>

  </div>
</header>

<!-- PAGE CONTENT -->
<div class="pt-20">
{% block content %}
{% endblock %}
</div>

<!-- FOOTER -->
<footer class="bg-[#0F1035] text-gray-300 text-center py-6">
  <p>© 2026 Smart Daily Habit Accountability Partner</p>
</footer>

</body>
</html>
